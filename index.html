<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>שאגת הארי - ריבוי ערוצים</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/pBvLbsG3/ed89a1453931.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Assistant:wght@300;400;500;600;700;800&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ... [כאן נמצאים כל העיצובים המקוריים שלך] ... */
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;}
body{height:100%;font-family:'Heebo',sans-serif;-webkit-font-smoothing:antialiased;background:#eae9e4;display:flex;flex-direction:row-reverse;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#eae9e4;display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-card{background:#fff;border-radius:18px;padding:38px 32px;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.12);max-width:320px;width:90%;}
.login-logo-img{width:90px;height:90px;border-radius:16px;margin:0 auto 14px;display:block;object-fit:contain;}
.login-title{font-size:20px;font-weight:900;color:#111;margin-bottom:4px;}

/* ── NEW: LEFT SIDEBAR FOR CHANNELS ── */
#leftSidebar {
  width: 240px; min-width: 240px;
  background: #fff;
  border-right: 1px solid rgba(0,0,0,.08);
  flex-shrink: 0;
  position: sticky; top: 56px; height: calc(100vh - 56px);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform 0.3s ease;
}
.channels-hdr {
  padding: 15px; font-size: 14px; font-weight: 800; color: #111;
  border-bottom: 1px solid #f0f0f0; background: #fafafa;
}
#channelsList { flex: 1; overflow-y: auto; padding: 10px 0; }
.channel-item {
  padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600; color: #4b5563;
  border-bottom: 1px solid #f9fafb; transition: background 0.2s, color 0.2s;
}
.channel-item:hover { background: #f3f4f6; }
.channel-item.active { background: #eff6ff; color: #1a56db; border-right: 4px solid #1a56db; }
.channel-item i { width: 16px; text-align: center; color: #9ca3af; }
.channel-item.active i { color: #1a56db; }

#mobileMenuBtn { display: none; background: none; border: none; font-size: 18px; color: #111; cursor: pointer; padding: 5px; }

@media(max-width: 900px) {
  #leftSidebar { position: fixed; left: 0; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.12); }
  #leftSidebar.open { transform: translateX(0); }
  #mobileMenuBtn { display: block; }
}

body.dark #leftSidebar { background: #1a1a2e; border-color: #2a2a40; }
body.dark .channels-hdr { background: #1e1e30; color: #fff; border-color: #2a2a40; }
body.dark .channel-item { color: #d1d5db; border-color: #2a2a40; }
body.dark .channel-item:hover { background: #2a2a45; }
body.dark .channel-item.active { background: #2a2a45; color: #a5b4fc; border-right-color: #a5b4fc; }

/* ... [שאר עיצובי ה-CSS המקוריים שלך - לא נגעתי בהם] ... */
/* העתק לכאן את כל שאר ה-CSS המקורי מקובץ הלקוח */

/* APP */
#app{flex:1;min-width:0;height:100%;display:none;flex-direction:column;}
header {
  background:#fff;border-bottom:1px solid rgba(0,0,0,.08);
  height:56px;padding:0 14px; display:flex;align-items:center;gap:12px;
  flex-shrink:0;position:fixed;top:0;left:0;right:0;z-index:100;
}
#app{padding-top:56px;}
#feedWrap{flex:1;overflow-y:auto;padding:10px 0 24px;}
#feedInner{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
</style>
</head>
<body>
<div id="prog"></div>

<div id="loginScreen">
  <div class="login-card">
    <img class="login-logo-img" src="https://i.ibb.co/pBvLbsG3/ed89a1453931.png">
    <div class="login-title">שאגת הארי</div>
    <div id="googleBtn"></div>
  </div>
</div>

<div id="rightSidebar">
    </div>

<div id="app">
  <header>
    <button id="mobileMenuBtn" onclick="toggleLeftSidebar()"><i class="fas fa-bars"></i></button>
    <img class="hdr-avatar" src="https://i.ibb.co/pBvLbsG3/ed89a1453931.png">
    <div class="hdr-info">
      <div class="hdr-name" id="hdrChannelName">שאגת הארי - <span>כללי</span></div>
      <div class="hdr-status"><div class="hdr-dot"></div>מחובר · עדכונים חיים</div>
    </div>
    </header>

  <div id="feedWrap">
    <div id="loadMoreSpinner"><div class="lm-ring"></div>טוען עוד...</div>
    <div id="feedInner"></div>
    <div id="empty"><i class="fas fa-satellite-dish"></i><p>אין הודעות בערוץ זה...</p></div>
  </div>
</div>

<div id="leftSidebar">
  <div class="channels-hdr">📋 ערוצים בקהילה</div>
  <div id="channelsList">
    </div>
</div>

<script>
// --- הגדרות השרת והמערכת ---
const BACKEND = 'https://dhoc97909.pythonanywhere.com';
let currentChannelId = 'general'; // הערוץ הדיפולטיבי

const CHANNELS = [
  { id: 'general', name: 'כללי', icon: 'fa-hashtag' },
  { id: 'news', name: 'מבזקי חדשות', icon: 'fa-bullhorn' },
  { id: 'discussions', name: 'דיונים', icon: 'fa-comments' },
  { id: 'admin_only', name: 'הודעות הנהלה', icon: 'fa-shield-alt' }
];

// --- רינדור רשימת הערוצים ---
function renderChannels() {
  const list = document.getElementById('channelsList');
  list.innerHTML = CHANNELS.map(ch => `
    <div class="channel-item ${ch.id === currentChannelId ? 'active' : ''}" onclick="switchChannel('${ch.id}', '${ch.name}')">
      <i class="fas ${ch.icon}"></i> ${ch.name}
    </div>
  `).join('');
  document.getElementById('hdrChannelName').innerHTML = `שאגת הארי - <span style="color:#1a56db">${CHANNELS.find(c=>c.id===currentChannelId).name}</span>`;
}

// --- החלפת ערוץ ---
async function switchChannel(channelId, channelName) {
  if (currentChannelId === channelId) return;
  currentChannelId = channelId;
  renderChannels();
  
  if(window.innerWidth <= 900) {
      document.getElementById('leftSidebar').classList.remove('open');
  }

  // איפוס כל הנתונים של הפיד
  items = []; 
  lastTs = 0; 
  knownIds.clear(); 
  oldestTs = 0; 
  allLoaded = false;
  document.getElementById('feedInner').innerHTML = '';
  document.getElementById('empty').style.display = 'block';

  // טעינה מחדש מהשרת לערוץ הספציפי
  await loadFeed();
}

function toggleLeftSidebar() {
    document.getElementById('leftSidebar').classList.toggle('open');
}

// --- עדכונים לפונקציות השרת כדי שיתמכו בערוצים ---

async function loadFeed(){
  setLoading(true);
  try{
    // שים לב שנוסף הפרמטר channel
    const r=await fetch(`${BACKEND}/feed?channel=${currentChannelId}&limit=20`);
    const d=await r.json();
    if(d.status==='ok'){
      let allPages=[...d.feed].reverse();
      allPages.forEach(e=>knownIds.add(e.id));
      allLoaded=d.feed.length<20;
      oldestTs=allPages.length?Math.min(...allPages.map(e=>e.ts||Infinity)):0;

      items=allPages;
      lastTs=items.length?Math.max(...items.map(e=>e.ts||0)):0;

      const inner=document.getElementById('feedInner');
      inner.innerHTML='';
      if(!items.length){document.getElementById('empty').style.display='block';}
      else{
          document.getElementById('empty').style.display='none';
          inner.innerHTML=items.map(buildMsg).join('');
      }
      const wrap=document.getElementById('feedWrap');
      wrap.scrollTop=wrap.scrollHeight;
    }
  }catch(e){}
  setLoading(false);
}

async function loadMore(){
  if(loadingMore||allLoaded||!oldestTs)return;
  loadingMore=true;document.getElementById('loadMoreSpinner').classList.add('show');
  try{
    // שליחת ערוץ גם בטעינה אחורה
    const r=await fetch(`${BACKEND}/feed?channel=${currentChannelId}&before=${oldestTs}&limit=20`);
    const d=await r.json();
    if(d.status==='ok'&&d.feed.length){
      const older=d.feed.filter(e=>!knownIds.has(e.id)).reverse();
      if(!older.length){allLoaded=true;}
      else{
        older.forEach(e=>{knownIds.add(e.id);items.unshift(e);});
        oldestTs=Math.min(...older.map(e=>e.ts||Infinity));
        allLoaded=older.length<20;
        const inner=document.getElementById('feedInner');const wrap=document.getElementById('feedWrap');
        const prevHeight=wrap.scrollHeight;const prevTop=wrap.scrollTop;
        inner.insertAdjacentHTML('afterbegin',older.map(buildMsg).join(''));
        wrap.scrollTop=prevTop+(wrap.scrollHeight-prevHeight);
      }
    }else{allLoaded=true;}
  }catch(e){}finally{loadingMore=false;document.getElementById('loadMoreSpinner').classList.remove('show');}
}

async function pollAll(){
  if(!me||!items.length)return;
  pollPending=true;
  try{
    // שליחת הערוץ בבקשת הפולינג
    const r=await fetch(BACKEND+'/feed_poll',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({msgIds:items.map(e=>e.id),since:lastTs, channel: currentChannelId})});
    const d=await r.json();if(d.status!=='ok')return;
    // ... המשך הפונקציה בדיוק כפי שהיא במקור ...
  }catch(e){}finally{pollPending=false;}
}

async function sendFeedPost(){
  // ... תחילת הפונקציה המקורית ...
  const entry={
    channel: currentChannelId, // <--- הוספת הערוץ להודעה
    profile:composeProfile,
    text,
    imgUrl:composeImgUrl,
    videoUrl:composeVidUrl,
    htmlCode:composeHtmlCode,
    sender:me.name,
    // ... שאר ההגדרות כרגיל ...
  };
  // ... שליחה לשרת כרגיל ...
}

// קריאה ראשונית לרינדור ערוצים בעליית הדף
window.addEventListener('load',()=>{
  renderChannels();
});

// העתק את כל שאר ה-JS המקורי שלא נגענו בו (כמו buildMsg, תגובות, פרסומות, וכו') פה למטה.
</script>
</body>
</html>
